name: CI

env:
  CI: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - name: Install Dependencies
        run: pnpm install
      - name: Build Packages
        run: pnpm build
      - name: Build storybook
        run: pnpm storybook:build
      - name: Lint Packages
        run: pnpm lint
      - name: Test Packages
        run: pnpm test
      - name: Install Playwright Browsers
        run: pnpm --filter @odysea/extension exec playwright install chromium --with-deps
      - name: Run E2E Tests
        timeout-minutes: 60
        run: xvfb-run -a pnpm --filter @odysea/extension test:e2e
      - name: Upload Report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/extension/playwright-report/
          retention-days: 10
